<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最新公告</title>
    <style>
        body {
            font-family: "SF Pro Display", "ChineseFont", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.6;
            color: #1d1d1f;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .post-image img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .post-video video {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .post-audio audio {
            width: 100%;
            max-width: 400px;
        }
        h1, h2, h3 {
            color: #1d1d1f;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        p {
            margin-bottom: 1rem;
        }
        code {
            background: rgba(0, 0, 0, 0.05);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
        }
    </style>
</head>
<body>
    <article>
        <header>
            <h1>最新公告</h1>
            <time>2025年09月28日 14:48:30</time>
        </header>
        
        <div class="post-content">
            <em>也许 你我就是彼岸花 我是曼珠 你是沙华</em>
        </div>
    </article>

</html>
